admin:
  address:
    socket_address: { address: 127.0.0.1, port_value: 9901 }
static_resources:
  listeners:
    # Listener with distribution-based delay (upstream filter on cluster)
    - address:
        socket_address:
          address: 0.0.0.0
          port_value: 10000
      filter_chains:
        - filters:
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                stat_prefix: ingress_http
                route_config:
                  virtual_hosts:
                    - name: local_route
                      domains:
                        - "*"
                      routes:
                        - match:
                            prefix: "/"
                          route:
                            cluster: simulated_backend
                http_filters:
                  - name: envoy.filters.http.router
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router
    # Listener routing to a cluster with fixed (flat) delay
    - address:
        socket_address:
          address: 0.0.0.0
          port_value: 10001
      filter_chains:
        - filters:
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                stat_prefix: ingress_http_fixed
                route_config:
                  virtual_hosts:
                    - name: local_route
                      domains:
                        - "*"
                      routes:
                        - match:
                            prefix: "/"
                          route:
                            cluster: fixed_delay_backend
                http_filters:
                  - name: envoy.filters.http.router
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router
  clusters:
    # Cluster with the latency/fault upstream filter — simulates a realistic endpoint
    - name: simulated_backend
      connect_timeout: 5s
      type: strict_dns
      lb_policy: round_robin
      load_assignment:
        cluster_name: simulated_backend
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: 127.0.0.1
                      port_value: 1234
      typed_extension_protocol_options:
        envoy.extensions.upstreams.http.v3.HttpProtocolOptions:
          "@type": type.googleapis.com/envoy.extensions.upstreams.http.v3.HttpProtocolOptions
          explicit_http_config:
            http_protocol_options: {}
          http_filters:
            - name: dynamic_modules/latency_fault
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.http.dynamic_modules.v3.DynamicModuleFilter
                dynamic_module_config:
                  name: latency_fault_module
                  do_not_close: true
                filter_name: latency_fault
                filter_config:
                  "@type": type.googleapis.com/google.protobuf.StringValue
                  value: |
                    endpoints:
                      - match:
                          prefix: "/delay"
                        responses:
                          - status: 200
                            resolution: 1000
                            distribution:
                              p0.0: "20ms"
                              p50.0: "50ms"
                              p90.0: "100ms"
                              p99.0: "200ms"
                              p100.0: "300ms"
                      - match:
                          prefix: "/abort"
                        responses:
                          - status: 503
                            resolution: 1000
                            distribution:
                              p0.0: "0ms"
                              p100.0: "5ms"
                      - match:
                          prefix: "/mixed"
                        responses:
                          - status: 200
                            resolution: 500
                            distribution:
                              p0.0: "30ms"
                              p50.0: "50ms"
                              p100.0: "80ms"
                          - status: 429
                            resolution: 500
                            distribution:
                              p0.0: "0ms"
                              p100.0: "5ms"
                      - match:
                          prefix: "/"
                        responses:
                          - status: 200
                            resolution: 1000
                            distribution:
                              p0.0: "5ms"
                              p50.0: "10ms"
                              p100.0: "20ms"
            - name: envoy.filters.http.upstream_codec
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.http.upstream_codec.v3.UpstreamCodec
    # Cluster with a flat 100ms delay — simulates fixed latency
    - name: fixed_delay_backend
      connect_timeout: 5s
      type: strict_dns
      lb_policy: round_robin
      load_assignment:
        cluster_name: fixed_delay_backend
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: 127.0.0.1
                      port_value: 1234
      typed_extension_protocol_options:
        envoy.extensions.upstreams.http.v3.HttpProtocolOptions:
          "@type": type.googleapis.com/envoy.extensions.upstreams.http.v3.HttpProtocolOptions
          explicit_http_config:
            http_protocol_options: {}
          http_filters:
            - name: dynamic_modules/latency_fault_fixed
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.http.dynamic_modules.v3.DynamicModuleFilter
                dynamic_module_config:
                  name: latency_fault_module
                  do_not_close: true
                filter_name: latency_fault
                filter_config:
                  "@type": type.googleapis.com/google.protobuf.StringValue
                  value: |
                    endpoints:
                      - match:
                          prefix: "/"
                        responses:
                          - status: 200
                            resolution: 1000
                            distribution:
                              p0.0: "100ms"
                              p100.0: "100ms"
            - name: envoy.filters.http.upstream_codec
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.http.upstream_codec.v3.UpstreamCodec
